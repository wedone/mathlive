<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>可滚动虚拟键盘 - fixedRows 底层 API</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
    }

    /* 编辑器区域撑满剩余空间，math-field 靠下对齐 */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      /* padding: 0 16px; */
    }

    math-field {
      font-size: 22px;
      width: 100%;
      /* max-width: 600px; */
      border: none;
      /* 去掉组件默认边框 */
      outline: none;
      /* 去掉浏览器默认聚焦轮廓 */
      /* border: 1px solid #ccc; */
      border-bottom: none;
      /* border-radius: 8px 8px 0 0; */
      padding: 8px 12px;
      /* 内边距，顺序： 上下、左右 */
      /* background: #fff; */
    }

    math-field:focus-within {
      border-color: #0d80f2;
      outline: none;
      box-shadow: 0 0 0 2px rgba(13, 128, 242, 0.2);
    }

    /* 隐藏 math-field 菜单切换按钮 */
    math-field::part(menu-toggle) {
      display: none;
    }

    math-field::part(virtual-keyboard-toggle) {
      display: none;
    }

    /* 虚拟键盘顶部与 math-field 底部无缝连接 */
    body>.ML__keyboard.is-visible>.MLK__backdrop {
      box-shadow: none;
      border-top: none;
    }
  </style>
</head>

<body>

  <div class="editor-area">
    <math-field id="mf">x=\frac{-b\pm\sqrt{b^2-4ac}}{2a}</math-field>
  </div>

  <script type="module">
    import '/dist/mathlive.mjs';

    const mf = document.getElementById('mf');

    // 永远显示虚拟键盘
    mf.mathVirtualKeyboardPolicy = 'manual';
    mathVirtualKeyboard.show();

    mathVirtualKeyboard.layouts = [
      {
        label: '基本',
        layers: [
          {
            rows: [
              // 第一行
              ['[0]', '[1]', '[2]', '[3]', '[4]', { class: 'separator', width: 0.5 },
                { latex: "A", variants: ["a", "\\alpha"] },
                { latex: "B", variants: ["b", "\\beta"] },
                { latex: "C", variants: ["c", "\\gamma"] },
                { latex: "D", variants: ["d", "\\delta"] },
                { latex: "E", variants: ["e", "\\epsilon"] }
              ],
              // { class: 'small', latex: '\\frac{#@}{#?}' }, '\\varnothing', '\\infty', '\\in', '\\notin'],
              // 第二行
              ['[5]', '[6]', '[7]', '[8]', '[9]', { class: 'separator', width: 0.5 },
                { latex: "F", variants: ["f", "\\phi"] },
                { latex: "G", variants: ["g", "\\gamma"] },
                { latex: "H", variants: ["h", "\\delta"] },
                { latex: "I", variants: ["i", "\\epsilon"] },
                { latex: "J", variants: ["j", "\\phi"] }
                // '(#@)', '[)]', '\\lt', '\\le', '\\hat{=}'
              ],
              // 第三行
              ['[.]',
                { latex: '{#@}^{\\placeholder{@0}}', variants: ['{#@}_{\\placeholder{@0}}'] },
                { latex: '\\sqrt{#0}', variants: ['\\sqrt{#@}'] },
                { class: 'small', latex: '\\frac{#@}{#?}' },
                { latex: '\\overrightarrow{#0}', variants: ['\\vec{#0}'] },
                { class: 'separator', width: 0.5 },
                { latex: "K", variants: ["k", "\\phi"] },
                { latex: "L", variants: ["l", "\\gamma"] },
                { latex: "M", variants: ["m", "\\delta"] },
                { latex: "N", variants: ["n", "\\epsilon"] },
                { latex: "O", variants: ["o", "\\phi"] }
                // '[', ']', '\\gt', '\\ne', '\\ge'
              ],
              // 第四行
              [
                { latex: '|{#0}|', variants: ['||{#0}||', '{#@}°'] },
                { latex: '{#@}^{\\prime}', variants: ['{#@}^{\\doubleprime}', '{#@}°'] },
                '[.]', '[.]', '\\colon', { class: 'separator', width: 0.5 },
                { latex: "P", variants: ["p", "\\gamma"] },
                { latex: "Q", variants: ["q", "\\delta"] },
                { latex: "R", variants: ["r", "\\epsilon"] },
                { latex: "S", variants: ["s", "\\phi"] },
                { latex: "T", variants: ["t", "\\gamma"] },
              ],
              // 第五行
              ['\\alpha', '\\beta', '\\gamma', '\\delta', { class: 'separator', width: 0.5 },
                { latex: "U", variants: ["u", "\\phi"] },
                { latex: "V", variants: ["v", "\\gamma"] },
                { latex: "W", variants: ["w", "\\delta"] },
                { latex: "X", variants: ["x", "\\epsilon"] },
                { latex: "Y", variants: ["y", "\\phi"] }
              ],
              // 第六行
              ['\\sin', '\\cos', '\\tan', '\\log', { class: 'separator', width: 0.5 },
                '\\lim', '\\infty', '\\partial', '\\nabla'
              ],
            ],
            fixedRows: [
              ['[+]', '[-]', '[*]', '[/]', '[=]',
                { class: 'separator', width: 0.5 },
                { label: '[shift]', width: 1 },
                { label: '[backspace]', width: 1 },
                // { class: 'action', label: '[backspace]', "command": 'backspace', variants: '[deleteAll]', width: 1 },
                '[left]', '[right]',
                { label: '[action]', width: 1 }],
            ],
          },
        ],
      },
      {
        label: '符号',
        layers: [
          {
            rows: [
              ['\\pm', '\\mp', '\\times', '\\div', '\\cdot', '\\ast', '\\star', '\\circ'],
              ['\\cap', '\\cup', '\\wedge', '\\vee', '\\oplus', '\\otimes', '\\ominus', '\\oslash'],
              ['\\subseteq', '\\supseteq', '\\subset', '\\supset', '\\in', '\\notin', '\\ni', '\\emptyset'],
              ['\\rightarrow', '\\leftarrow', '\\Rightarrow', '\\Leftarrow', '\\mapsto', '\\longmapsto', '\\implies', '\\iff'],
              ['\\approx', '\\simeq', '\\cong', '\\equiv', '\\propto', '\\sim', '\\models', '\\dashv'],
              ['\\forall', '\\exists', '\\nexists', '\\neg', '\\top', '\\bot', '\\vdash', '\\vDash'],
            ],
            fixedRows: [
              ['[left]', '[right]', '[backspace]', { class: 'separator', width: 0.5 },
                '[-]', '[+]', '[=]', '[.]',
                { label: '[action]', width: 1.5 }],
            ],
          },
        ],
      },
      {
        label: '希腊',
        layers: [
          {
            rows: [
              ['\\alpha', '\\beta', '\\gamma', '\\delta', '\\epsilon', '\\zeta', '\\eta', '\\theta'],
              ['\\iota', '\\kappa', '\\lambda', '\\mu', '\\nu', '\\xi', '\\omicron', '\\pi'],
              ['\\rho', '\\sigma', '\\tau', '\\upsilon', '\\phi', '\\chi', '\\psi', '\\omega'],
              ['\\Gamma', '\\Delta', '\\Theta', '\\Lambda', '\\Xi', '\\Pi', '\\Sigma', '\\Phi'],
              ['\\Psi', '\\Omega', '\\varpi', '\\varrho', '\\varsigma', '\\varphi', '\\aleph', '\\hbar'],
            ],
            fixedRows: [
              ['[left]', '[right]', '[backspace]', { class: 'separator', width: 0.5 },
                '[-]', '[+]', '[=]', '[.]',
                { label: '[action]', width: 1.5 }],
            ],
          },
        ],
      },
    ];
  </script>

</body>

</html>
