<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>еҸҜж»ҡеҠЁиҷҡжӢҹй”®зӣҳ - fixedRows еә•еұӮ API</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
    }

    /* зј–иҫ‘еҷЁеҢәеҹҹж’‘ж»Ўеү©дҪҷз©әй—ҙпјҢmath-field йқ дёӢеҜ№йҪҗ */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      /* padding: 0 16px; */
    }

    math-field {
      font-size: 22px;
      width: 100%;
      /* max-width: 600px; */
      border: none;
      /* еҺ»жҺүз»„д»¶й»ҳи®Өиҫ№жЎҶ */
      outline: none;
      /* еҺ»жҺүжөҸи§ҲеҷЁй»ҳи®ӨиҒҡз„ҰиҪ®е»“ */
      /* border: 1px solid #ccc; */
      border-bottom: none;
      /* border-radius: 8px 8px 0 0; */
      padding: 8px 12px;
      /* еҶ…иҫ№и·қпјҢйЎәеәҸпјҡ дёҠдёӢгҖҒе·ҰеҸі */
      /* background: #fff; */
    }

    math-field:focus-within {
      border-color: #0d80f2;
      outline: none;
      box-shadow: 0 0 0 2px rgba(13, 128, 242, 0.2);
    }

    /* йҡҗи—Ҹ math-field иҸңеҚ•еҲҮжҚўжҢүй’® */
    math-field::part(menu-toggle) {
      display: none;
    }

    math-field::part(virtual-keyboard-toggle) {
      display: none;
    }

    /* иҷҡжӢҹй”®зӣҳйЎ¶йғЁдёҺ math-field еә•йғЁж— зјқиҝһжҺҘ */
    body>.ML__keyboard.is-visible>.MLK__backdrop {
      box-shadow: none;
      border-top: none;
    }
  </style>
</head>

<body>

  <div class="editor-area">
    <math-field id="mf">x=\frac{-b\pm\sqrt{b^2-4ac}}{2a}</math-field>
  </div>

  <script type="module">
    import '/dist/mathlive.mjs';

    const mf = document.getElementById('mf');

    // ж°ёиҝңжҳҫзӨәиҷҡжӢҹй”®зӣҳ
    mf.mathVirtualKeyboardPolicy = 'manual';
    mathVirtualKeyboard.show();

    mathVirtualKeyboard.layouts = [
      {
        label: 'еҹәжң¬',
        layers: [
          {
            rows: [
              // з¬¬дёҖиЎҢ
              ['[0]', '[1]', '[2]', '[3]', '[4]', { class: 'separator', width: 0.5 },
                { label: "A", variants: ["a", "\\alpha"] },
                { label: "B", variants: ["b", "\\beta"] },
                { label: "C", variants: ["c", "\\gamma"] },
                { label: "D", variants: ["d", "\\delta"] },
                { label: "E", variants: ["e", "\\epsilon"] }
              ],
              // { class: 'small', latex: '\\frac{#@}{#?}' }, '\\varnothing', '\\infty', '\\in', '\\notin'],
              // з¬¬дәҢиЎҢ
              ['[5]', '[6]', '[7]', '[8]', '[9]', { class: 'separator', width: 0.5 },
                { label: "F", variants: ["f", "\\phi"] },
                { label: "G", variants: ["g", "\\gamma"] },
                { label: "H", variants: ["h", "\\delta"] },
                { label: "I", variants: ["i", "\\epsilon"] },
                { label: "J", variants: ["j", "\\phi"] }
                // '(#@)', '[)]', '\\lt', '\\le', '\\hat{=}'
              ],
              // з¬¬дёүиЎҢ
              [
                '[.]',
                { latex: '{#@}^{\\placeholder{@0}}', variants: ['{#@}_{\\placeholder{@0}}', '{#@}_{\\placeholder{@?}}^{\\placeholder{@?}}'] },
                { latex: '\\sqrt{#0}', variants: ['\\sqrt{#@}'] },
                { class: 'small', latex: '\\frac{#@}{#?}', variants: ["\\frac{#?}{#@}"] },
                { latex: '\\overrightarrow{#0}', variants: ['\\vec{#0}'] },
                { class: 'separator', width: 0.5 },
                { label: "K", variants: ["k", "\\phi"] },
                { label: "L", variants: ["l", "\\gamma"] },
                { label: "M", variants: ["m", "\\delta"] },
                { label: "N", variants: ["n", "\\epsilon"] },
                { label: "O", variants: ["o", "\\phi"] }
                // '[', ']', '\\gt', '\\ne', '\\ge'
              ],
              // з¬¬еӣӣиЎҢ
              [
                { latex: '|{#0}|', variants: ['||{#0}||'] },
                { latex: '{#@}^{\\prime}', variants: ['{#@}^{\\doubleprime}', '{#@}В°'] },
                { lable: 'вҠҘ', variants: ['\\not\\perp'] },
                '[.]', '\\colon', { class: 'separator', width: 0.5 },
                { label: "P", variants: ["p", "\\gamma"] },
                { label: "Q", variants: ["q", "\\delta"] },
                { label: "R", variants: ["r", "\\epsilon"] },
                { label: "S", variants: ["s", "\\phi"] },
                { label: "T", variants: ["t", "\\gamma"] },
              ],
              // з¬¬дә”иЎҢ
              [
                '[(]', '\\rbrace', '\\lceil', '\\rceil', { class: 'separator', width: 0.5 },
                '\\beta', '\\gamma', '\\delta',
                { class: 'separator', width: 0.5 },
                { label: "U", variants: ["u", "\\phi"] },
                { label: "V", variants: ["v", "\\gamma"] },
                { label: "W", variants: ["w", "\\delta"] },
                { label: "X", variants: ["x", "\\epsilon"] },
                { label: "Y", variants: ["y", "\\phi"] }
              ],
              // з¬¬е…ӯиЎҢ
              ['\\sin', '\\cos', '\\tan', '\\log', { class: 'separator', width: 0.5 },
                '\\lim', '\\infty', '\\partial', '\\nabla'
              ],
            ],
            fixedRows: [
              ['[+]', '[-]', '[*]', '[/]', '[=]',
                { class: 'separator', width: 0.5 },
                { label: '[shift]', width: 1 },
                { label: '[backspace]', width: 1 },
                // { class: 'action', label: '[backspace]', "command": 'backspace', variants: '[deleteAll]', width: 1 },
                '[left]', '[right]',
                { label: '[return]', width: 1 }],
            ],
          },
        ],
      },
      {
        label: 'з¬ҰеҸ·',
        layers: [
          {
            rows: [
              ['\\pm', '\\mp', '\\times', '\\div', '\\cdot', '\\ast', '\\star', '\\circ'],
              ['\\cap', '\\cup', '\\wedge', '\\vee', '\\oplus', '\\otimes', '\\ominus', '\\oslash'],
              ['\\subseteq', '\\supseteq', '\\subset', '\\supset', '\\in', '\\notin', '\\ni', '\\emptyset'],
              ['\\rightarrow', '\\leftarrow', '\\Rightarrow', '\\Leftarrow', '\\mapsto', '\\longmapsto', '\\implies', '\\iff'],
              ['\\approx', '\\simeq', '\\cong', '\\equiv', '\\propto', '\\sim', '\\models', '\\dashv'],
              ['\\forall', '\\exists', '\\nexists', '\\neg', '\\top', '\\bot', '\\vdash', '\\vDash'],
            ],
            fixedRows: [
              ['[left]', '[right]', '[backspace]', { class: 'separator', width: 0.5 },
                '[-]', '[+]', '[=]', '[.]',
                { label: '[action]', width: 1.5 }],
            ],
          },
        ],
      },
      {
        label: 'еёҢи…Ҡ',
        layers: [
          {
            rows: [
              ['\\alpha', '\\beta', '\\gamma', '\\delta', '\\epsilon', '\\zeta', '\\eta', '\\theta'],
              ['\\iota', '\\kappa', '\\lambda', '\\mu', '\\nu', '\\xi', '\\omicron', '\\pi'],
              ['\\rho', '\\sigma', '\\tau', '\\upsilon', '\\phi', '\\chi', '\\psi', '\\omega'],
              ['\\Gamma', '\\Delta', '\\Theta', '\\Lambda', '\\Xi', '\\Pi', '\\Sigma', '\\Phi'],
              ['\\Psi', '\\Omega', '\\varpi', '\\varrho', '\\varsigma', '\\varphi', '\\aleph', '\\hbar'],
            ],
            fixedRows: [
              ['[left]', '[right]', '[backspace]', { class: 'separator', width: 0.5 },
                '[-]', '[+]', '[=]', '[.]',
                { label: '[action]', width: 1.5 }],
            ],
          },
        ],
      },
    ];
  </script>

</body>

</html>
